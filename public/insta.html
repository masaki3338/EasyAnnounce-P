<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Easyアナウンス</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans JP", sans-serif;
      background: linear-gradient(180deg, rgba(12, 33, 74, 0.72), rgba(23, 84, 160, 0.62)),
                  url("https://images.unsplash.com/photo-1508341591423-4347099e1f19?auto=format&fit=crop&w=1200&q=80") center/cover no-repeat;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .phone {
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.88);
      border-radius: 30px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.22);
      overflow: hidden;
    }
    .hero { padding: 26px 20px 18px; text-align: center; background: linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,255,255,0.58)); }
    .mini { display: inline-block; padding: 6px 12px; background: #e9f1ff; color: #234b8f; border-radius: 999px; font-size: 12px; font-weight: 700; margin-bottom: 14px; }
    .title { margin: 0; font-size: 34px; font-weight: 800; color: #123b84; }
    .subtitle { margin: 12px 0 0; font-size: 16px; line-height: 1.8; color: #233a5d; font-weight: 500; }
    .content { padding: 0 16px 18px; }
    .card { background: #ffffff; border-radius: 24px; padding: 20px; box-shadow: 0 10px 24px rgba(15, 44, 94, 0.10); }
    .card-title { margin: 0 0 8px; text-align: center; font-size: 20px; font-weight: 800; color: #173a77; }
    .card-text { margin: 0 0 18px; text-align: center; font-size: 14px; line-height: 1.8; color: #4c5f7d; }
    .buttons { display: flex; flex-direction: column; align-items: center; gap: 12px; }

    /* Google Playバッジスタイル */
    .btn-android { display: block; width: 220px; filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.24)); }
    .btn-android img { width: 100%; display: block; }

    /* Apple用ボタン */
    .btn-apple {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 220px;
      height: 64px;
      background: #000000;
      border: 1px solid #333;
      border-radius: 13px;
      text-decoration: none;
      color: #ffffff;
      font-weight: 800;
      font-size: 16px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.24);
    }
    .btn-apple img { height: 32px; width: auto; filter: invert(1); }

    .note { margin: 14px 0 0; text-align: center; font-size: 13px; color: #5d6e89; font-weight: 500; }
    .guide-img { width: 100%; border-radius: 12px; margin-top: 15px; border: 1px solid #eee; }
  </style>
</head>
<body>

  <div class="phone">
    <div class="hero">
      <div class="mini">野球アナウンス支援アプリ</div>
      <h1 class="title">Easyアナウンス</h1>
      <p class="subtitle">
        野球アナウンス、もう迷わない！<br>
        保護者の負担を減らして<br>
        スムーズに読み上げできます。
      </p>
    </div>

    <div class="content">
      <div class="card">
        <h2 class="card-title">ダウンロードはこちら</h2>
        <p class="card-text">
          お使いの端末に合わせて<br>
          お選びください
        </p>
        
        <div class="buttons">
          <a class="btn-android" href="https://play.google.com/store/apps/details?id=com.easyannounce.pony" target="_blank">
            <img src="https://easy-announce-p.vercel.app/google-play-badge.png" alt="Google Playで手に入れよう">
          </a>

          <a class="btn-apple" href="https://easy-announce-p.vercel.app/">
            <img src="iOS.jpg" alt="Apple">
            <span>iPhone / iPad で使う</span>
          </a>
        </div>

        <p class="note">
          iPhone / iPad はホーム画面に追加することで<br>
          アプリのように利用できます
        </p>

        <p class="note" style="font-weight: bold; color: #234b8f;">
         追加のやり方はこちら↓
        </p>
        <img src="https://easy-announce-p.vercel.app/IphoneInstallGuide.png" alt="インストールガイド" class="guide-img">

      </div>
    </div>
  </div>

</body>
</html>
